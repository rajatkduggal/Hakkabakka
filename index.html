<style>

:root{
--gold:#d4af37;
--primary:#c96b2c;
--bg:#0d0b09;
--card:#1a1411;
--text:#f6f1ea;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Outfit',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
padding-bottom:120px;
}

.hero{
min-height:70vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
background:
linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.92)),
url('logo.jpg');

background-size:cover;
background-position:center;
}

.hero h1{
font-size:clamp(3rem,8vw,6rem);
font-weight:800;
letter-spacing:4px;
color:var(--gold);
}

.hero p{
margin-top:20px;
font-size:1.1rem;
}

.hero a{
display:inline-block;
margin-top:30px;
padding:16px 32px;
background:linear-gradient(135deg,var(--primary),var(--gold));
color:black;
font-weight:800;
text-decoration:none;
border-radius:14px;
}

.container{
width:min(1200px,92%);
margin:auto;
}

.order-box{
margin-top:-50px;
background:var(--card);
padding:25px;
border-radius:22px;
border:1px solid rgba(212,175,55,.15);
position:relative;
z-index:10;
}

.radio-group{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.radio-group label{
background:#251b15;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
}

input,select{
width:100%;
padding:14px;
margin-top:12px;
background:#211711;
border:1px solid #3b2a1f;
color:white;
border-radius:12px;
font-family:inherit;
}

.hidden{
display:none;
}

.warning{
color:#ff8585;
margin-top:10px;
font-size:.9rem;
font-weight:600;
}

.section-title{
margin:50px 0 20px;
padding-left:15px;
border-left:5px solid var(--gold);
font-size:2rem;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:var(--card);
border-radius:20px;
overflow:hidden;
border:1px solid #2b1f18;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:var(--gold);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card h3{
margin-bottom:15px;
font-size:1.4rem;
}

.price-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
}

.price{
font-size:1.5rem;
font-weight:800;
color:var(--gold);
}

.qty-box{
display:flex;
align-items:center;
gap:10px;
}

.qty-btn{
width:42px;
height:42px;
border:none;
border-radius:12px;
background:var(--primary);
color:white;
font-size:1.2rem;
font-weight:800;
cursor:pointer;
}

.qty{
font-size:1.2rem;
font-weight:700;
min-width:24px;
text-align:center;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(13,11,9,.95);
backdrop-filter:blur(10px);
border-top:2px solid var(--gold);
z-index:999;
}

.total-price{
font-size:2rem;
font-weight:800;
color:var(--gold);
}

.pay-btn{
background:linear-gradient(135deg,var(--primary),var(--gold));
color:black;
border:none;
padding:15px 28px;
font-weight:800;
border-radius:14px;
cursor:pointer;
}

.footer{
margin-top:70px;
padding:60px 20px;
text-align:center;
background:#080605;
}

.address{
max-width:700px;
margin:20px auto;
padding:16px;
background:rgba(201,107,44,.08);
border-radius:12px;
line-height:1.8;
}

.whatsapp-btn{
display:inline-block;
margin-top:15px;
background:#25D366;
padding:14px 30px;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:700;
}
