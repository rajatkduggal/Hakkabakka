<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hakka Bakka Cafe</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.jpg">
<link rel="apple-touch-icon" href="logo.jpg">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--primary:#c96b2c;
--bg:#0d0b09;
--card:#1a1411;
--text:#f6f1ea;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Outfit',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
padding-bottom:120px;
}

.hero{
min-height:70vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
background:
linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.92)),
url('logo.jpg');

background-size:cover;
background-position:center;
}

.hero h1{
font-size:clamp(3rem,8vw,6rem);
font-weight:800;
letter-spacing:4px;
color:var(--gold);
}

.hero p{
margin-top:20px;
font-size:1.1rem;
}

.container{
width:min(1200px,92%);
margin:auto;
}

.section-title{
margin:50px 0 20px;
padding-left:15px;
border-left:5px solid var(--gold);
font-size:2rem;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
margin-top:40px;
}

.card{
background:var(--card);
border-radius:20px;
overflow:hidden;
border:1px solid #2b1f18;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:var(--gold);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card h3{
margin-bottom:15px;
font-size:1.4rem;
}

.price{
font-size:1.4rem;
font-weight:800;
color:var(--gold);
margin-top:10px;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:20px;
border-top:2px solid var(--gold);
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
}

.pay-btn{
background:linear-gradient(135deg,var(--primary),var(--gold));
border:none;
padding:15px 30px;
border-radius:12px;
font-weight:800;
cursor:pointer;
}

</style>

</head>
