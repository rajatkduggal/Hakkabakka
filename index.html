<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hakka Bakka Punjabi Dhaba</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b1113">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <div class="logo-box">
        <img src="logo.jpg" class="logo">
        <h2>Hakka Bakka</h2>
    </div>

    <ul>
        <li onclick="showPage('home')">Home</li>
        <li onclick="showPage('about')">About</li>
        <li onclick="showPage('menu')">Menu</li>
    </ul>
</nav>

<section id="home" class="page active">
    <img src="signboard.png" class="banner">
</section>

<section id="about" class="page">
    <div class="about-box">
        <h1>About Hakka Bakka</h1>
        <p>
            Authentic Punjabi Dhaba serving premium veg & non-veg dishes.
            Live tandoor, hygienic kitchen, fresh ingredients and family environment.
        </p>
        <p>
            Address:<br>
            Shop No.1, Near Canal Road,<br>
            Opp. Maqsudan Bypass, G.T Road, Jalandhar
        </p>
        <p><strong>Contact:</strong> 7796631555</p>
    </div>
</section>

<section id="menu" class="page">
    <img src="menu_20_6_26.jpg" class="full-menu">

    <button class="order-btn" onclick="openCart()">
        Click Here For Online Orders
    </button>
</section>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
