<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hakka Bakka Punjabi Dhaba</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7b1113">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="logo.jpg" class="logo">
    <h1>HAKKA BAKKA</h1>
    <p>Desi Swad, Modern Vibe</p>
</header>

<div class="banner">
    <img src="signboard.png">
</div>

<div class="customer-box">
    <input type="text" id="custName" placeholder="Name (Optional)">
    <input type="tel" id="custPhone" placeholder="Mobile Number" maxlength="10" required>

    <select id="orderType">
        <option>Dine-In</option>
        <option>Pickup</option>
        <option>Delivery</option>
    </select>
</div>

<div id="menu"></div>

<div class="cart-box">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3>Total ₹<span id="cartTotal">0</span></h3>

    <button onclick="saveOrder()">Confirm Order</button>
</div>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
