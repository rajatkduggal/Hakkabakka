<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hakka Bakka Cafe</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.jpg">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--olive:#556B2F;
--bg:#0c0c0c;
--card:#181818;
--text:#f5f5f5;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Outfit',sans-serif;
background:var(--bg);
color:var(--text);
padding-bottom:120px;
overflow-x:hidden;
}

.hero{
min-height:70vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
background:
linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.92)),
url('logo.jpg');

background-size:cover;
background-position:center;
}

.hero h1{
font-size:clamp(3rem,8vw,6rem);
color:var(--gold);
font-weight:800;
letter-spacing:4px;
}

.hero p{
margin-top:20px;
font-size:1.1rem;
}

.container{
width:min(1200px,92%);
margin:auto;
}

.order-box{
background:var(--card);
margin-top:-50px;
padding:25px;
border-radius:22px;
border:1px solid rgba(212,175,55,.2);
position:relative;
z-index:10;
}

.radio-group{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.radio-group label{
background:#222;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
}

input,select{
width:100%;
padding:14px;
margin-top:12px;
background:#222;
border:1px solid #333;
color:white;
border-radius:12px;
font-family:inherit;
}

.hidden{
display:none;
}

.warning{
color:#ff7b7b;
font-size:.9rem;
margin-top:10px;
font-weight:600;
}

.section-title{
margin:50px 0 20px;
padding-left:15px;
border-left:5px solid var(--gold);
font-size:2rem;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:var(--card);
border-radius:20px;
overflow:hidden;
border:1px solid #262626;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:var(--gold);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card h3{
margin-bottom:15px;
font-size:1.4rem;
}

.variant-select{
width:100%;
}

.price-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
}

.price{
font-size:1.5rem;
font-weight:800;
color:var(--gold);
}

.qty-box{
display:flex;
align-items:center;
gap:10px;
}

.qty-btn{
width:42px;
height:42px;
border:none;
border-radius:12px;
background:var(--olive);
color:white;
font-size:1.3rem;
font-weight:800;
cursor:pointer;
}

.qty{
font-size:1.2rem;
font-weight:700;
min-width:24px;
text-align:center;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-top:2px solid var(--gold);
z-index:999;
}

.total-price{
font-size:2rem;
font-weight:800;
color:var(--gold);
}

.pay-btn{
background:linear-gradient(135deg,var(--olive),var(--gold));
border:none;
padding:15px 28px;
font-weight:800;
border-radius:14px;
cursor:pointer;
}

</style>

</head>

<body>

<section class="hero">

<div>

<h1>HAKKA BAKKA CAFE</h1>

<p>
Premium Fast Food, Tandoor & Cafe Experience
</p>

</div>

</section>

<div class="container">

<div class="order-box">

<div class="radio-group">

<label>
<input type="radio" name="orderType" value="Table" checked>
Table
</label>

<label>
<input type="radio" name="orderType" value="Car">
Car
</label>

<label>
<input type="radio" name="orderType" value="Packing">
Takeaway
</label>

</div>

<select id="tableSelect">

<option value="">
Choose Table Number
</option>

<option>Table 1</option>
<option>Table 2</option>
<option>Table 3</option>
<option>Table 4</option>
<option>Table 5</option>

</select>

<div id="carSection" class="hidden">

<input
type="text"
id="carInput"
maxlength="10"
placeholder="Enter Car Number"
>

<p class="warning">
⚠️ Serve Only Cafe Parking Premises
</p>

</div>

<div id="packingFields" class="hidden">

<input
type="text"
id="customerName"
placeholder="Enter Your Name"
>

<input
type="tel"
id="customerPhone"
placeholder="Enter Mobile Number"
>

</div>

</div>

<h2 class="section-title">
Popular Menu
</h2>

<div class="grid" id="menuGrid"></div>

</div>

<div class="bottom-bar">

<div>

<div>Total Bill</div>

<div class="total-price" id="totalPrice">
₹0
</div>

</div>

<button
class="pay-btn"
onclick="sendOrder()"
>
Send Order
</button>

</div>

<script>

const menuItems=[

{
name:'Gourmet Pizza',
image:'pizza.png',
variants:[
{label:'Small',price:220},
{label:'Medium',price:340},
{label:'Large',price:460}
]
},

{
name:'Cheese Chilli Paneer',
image:'cheeschilli.png',
variants:[
{label:'Half',price:180},
{label:'Full',price:290}
]
},

{
name:'Honey Chilli Potato',
image:'hnychlyptato.png',
variants:[
{label:'Regular',price:140}
]
},

{
name:'Hakka Noodles',
image:'nudels.png',
variants:[
{label:'Half',price:120},
{label:'Full',price:200}
]
},

{
name:'Momos Special',
image:'momos.png',
variants:[
{label:'Steam',price:100},
{label:'Fried',price:130},
{label:'Tandoori',price:160}
]
},

{
name:'French Fries',
image:'fries.png',
variants:[
{label:'Classic',price:90},
{label:'Peri Peri',price:110}
]
},

{
name:'Spring Roll',
image:'springroll.png',
variants:[
{label:'Veg',price:120},
{label:'Paneer',price:150}
]
},

{
name:'Creamy Pasta',
image:'pasta.png',
variants:[
{label:'White Sauce',price:160},
{label:'Red Sauce',price:150}
]
},

{
name:'Loaded Waffle',
image:'waffle.png',
variants:[
{label:'Chocolate',price:130},
{label:'Oreo',price:150}
]
}

];

const menuGrid=document.getElementById('menuGrid');
const totalPrice=document.getElementById('totalPrice');

let cart=[];
let total=0;

menuItems.forEach(item=>{

const card=document.createElement('div');

card.className='card';

const options=item.variants.map(v=>
`<option value="${v.price}">
${v.label} - ₹${v.price}
</option>`
).join('');

card.innerHTML=`

<img src="${item.image}">

<div class="card-content">

<h3>${item.name}</h3>

<select class="variant-select">
${options}
</select>

<div class="price-row">

<div class="price">
₹${item.variants[0].price}
</div>

<div class="qty-box">

<button class="qty-btn minus">
-
</button>

<div class="qty">
0
</div>

<button class="qty-btn plus">
+
</button>

</div>

</div>

</div>

`;

const select=card.querySelector('.variant-select');
const price=card.querySelector('.price');
const qty=card.querySelector('.qty');
const plus=card.querySelector('.plus');
const minus=card.querySelector('.minus');

let quantity=0;

select.addEventListener('change',()=>{
price.innerText='₹'+select.value;
});

plus.addEventListener('click',()=>{

quantity++;
qty.innerText=quantity;

const selectedPrice=Number(select.value);

total+=selectedPrice;

cart.push({
name:item.name,
variant:select.options[select.selectedIndex].text,
price:selectedPrice
});

updateTotal();

});

minus.addEventListener('click',()=>{

if(quantity<=0)return;

quantity--;
qty.innerText=quantity;

const selectedPrice=Number(select.value);

total-=selectedPrice;

cart.pop();

if(total<0)total=0;

updateTotal();

});

menuGrid.appendChild(card);

});

function updateTotal(){
totalPrice.innerText='₹'+total;
}

const orderRadios=document.querySelectorAll('input[name="orderType"]');
const tableSelect=document.getElementById('tableSelect');
const carSection=document.getElementById('carSection');
const packingFields=document.getElementById('packingFields');

orderRadios.forEach(radio=>{

radio.addEventListener('change',()=>{

if(radio.value==='Table'){
tableSelect.classList.remove('hidden');
carSection.classList.add('hidden');
packingFields.classList.add('hidden');
}

if(radio.value==='Car'){
tableSelect.classList.add('hidden');
carSection.classList.remove('hidden');
packingFields.classList.add('hidden');
}

if(radio.value==='Packing'){
tableSelect.classList.add('hidden');
carSection.classList.add('hidden');
packingFields.classList.remove('hidden');
}

});

});

function sendOrder(){

if(cart.length===0){
alert('Please add items first');
return;
}

let message='✨ HAKKA BAKKA ORDER ✨%0A%0A';

cart.forEach((item,index)=>{
message+=`${index+1}. ${item.name} ${item.variant} ₹${item.price}%0A`;
});

message+=`%0A💵 Total Bill: ₹${total}`;

window.open(
`https://wa.me/917796631555?text=${message}`,
'_blank'
);

}

</script>

</body>

</html>
