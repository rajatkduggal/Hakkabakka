<style>
:root{
--gold:#D4AF37;
--olive:#556B2F;
--bg:#0b0b0b;
--card:#161616;
--text:#f0f0f0;

*{

padding:0;
box-sizing:border-box;
}

body{
font-family:'Outfit',sans-serif;
background:var(--bg);
color:var(--text);
padding-bottom:120px;
overflow-x:hidden;
}

.hero{
min-height:75vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
background:
linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.9)),
url('logo.jpg') center/cover;
}

.hero h1{
font-size:clamp(3rem,9vw,6rem);
color:var(--gold);
letter-spacing:4px;
}

.hero p{
margin-top:20px;
font-size:1.1rem;
line-height:1.8;
max-width:700px;
margin-inline:auto;
}

.hero-btn{
display:inline-block;
margin-top:30px;
background:linear-gradient(135deg,var(--gold),#b89224);
color:black;
padding:16px 32px;
border-radius:14px;
font-weight:800;
text-decoration:none;
}

.container{
width:min(1200px,92%);
margin:auto;
}

.order-box{
background:var(--card);
padding:25px;
border-radius:20px;
margin-top:-50px;
position:relative;
z-index:10;
border:1px solid rgba(212,175,55,.2);
}

.order-box h2{
text-align:center;
margin-bottom:20px;
}

.radio-group{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.radio-group label{
background:#222;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
}

input,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #333;
background:#222;
color:white;
margin-top:15px;
font-family:inherit;
}

.section-title{
margin:60px 0 25px;
padding-left:15px;
border-left:5px solid var(--gold);
font-size:2rem;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:var(--card);
border-radius:20px;
overflow:hidden;
border:1px solid #222;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:var(--gold);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card h3{
margin-bottom:15px;
font-size:1.4rem;
}

.price-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
}

.price{
font-size:1.4rem;
font-weight:800;
color:var(--gold);
}

.qty-box{
display:flex;
align-items:center;
gap:10px;
}

.qty-btn{
width:40px;
height:40px;
border:none;
border-radius:10px;
background:var(--olive);
color:white;
font-size:1.2rem;
font-weight:700;
cursor:pointer;
}

.qty{
font-size:1.2rem;
font-weight:700;
min-width:20px;
text-align:center;
}

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(10,10,10,.95);
padding:18px;
border-top:2px solid var(--gold);
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
backdrop-filter:blur(12px);
}

.total-price{
font-size:2rem;
font-weight:800;
color:var(--gold);
}

.pay-btn{
background:linear-gradient(135deg,var(--gold),#b89224);
border:none;
padding:15px 28px;
font-weight:800;
border-radius:12px;
cursor:pointer;
}

.footer{
margin-top:70px;
padding:60px 20px;
text-align:center;
background:#050505;
}

.address{
margin:20px auto;
padding:15px;
max-width:700px;
background:rgba(85,107,47,.12);
border:1px solid rgba(212,175,55,.2);
border-radius:12px;
line-height:1.8;
}

.whatsapp-btn{
display:inline-block;
margin-top:15px;
background:#25D366;
color:white;
padding:14px 28px;
border-radius:30px;
text-decoration:none;
font-weight:700;
}

.hidden{
display:none;
}

@media(max-width:768px){
.bottom-bar{
flex-direction:column;
gap:15px;
}

.pay-btn{
width:100%;
}

</div>

<h2 class="section-title" id="menu">Popular Menu</h2>

const menuGrid = document.getElementById('menuGrid');
const totalPrice = document.getElementById('totalPrice');

let cart = [];
let total = 0;

function renderMenu(){

menuItems.forEach((item,index)=>{

const card = document.createElement('div');
card.className='card';

const options = item.variants.map(v=>`
<option value="${v.price}">${v.label} - ₹${v.price}</option>
`).join('');

card.innerHTML=`
<img src="${item.image}" loading="lazy" alt="${item.name}">

<div class="card-content">
<h3>${item.name}</h3>

<select class="variant-select">
${options}
</select>

<div class="price-row">
<div class="price">₹${item.variants[0].price}</div>

<div class="qty-box">
<button class="qty-btn minus">-</button>
<div class="qty">0</div>
<button class="qty-btn plus">+</button>
</div>
</div>
</div>
`;

const select = card.querySelector('.variant-select');
const price = card.querySelector('.price');
const qty = card.querySelector('.qty');
const plus = card.querySelector('.plus');
const minus = card.querySelector('.minus');

let quantity = 0;

select.addEventListener('change',()=>{
price.innerText='₹'+select.value;
});

plus.addEventListener('click',()=>{

quantity++;
qty.innerText=quantity;

const selectedPrice = Number(select.value);
const selectedText = select.options[select.selectedIndex].text;

cart.push({
name:item.name,
variant:selectedText,
price:selectedPrice
});

total += selectedPrice;
updateTotal();

});

minus.addEventListener('click',()=>{

if(quantity<=0)return;

quantity--;
qty.innerText=quantity;

const selectedPrice = Number(select.value);

total -= selectedPrice;

if(total<0)total=0;

cart.pop();
updateTotal();

});

menuGrid.appendChild(card);

});

}

function updateTotal(){

totalPrice.innerText='₹'+total;

}

renderMenu();

const orderInputs = document.querySelectorAll('input[name="orderType"]');
const tableSelect = document.getElementById('tableSelect');
const carInput = document.getElementById('carInput');
const packingFields = document.getElementById('packingFields');

orderInputs.forEach(input=>{

input.addEventListener('change',()=>{

if(input.value==='Table'){

tableSelect.classList.remove('hidden');
carInput.classList.add('hidden');
packingFields.classList.add('hidden');

}

if(input.value==='Car'){

tableSelect.classList.add('hidden');
carInput.classList.remove('hidden');
packingFields.classList.add('hidden');

}

if(input.value==='Packing'){

tableSelect.classList.add('hidden');
carInput.classList.add('hidden');
packingFields.classList.remove('hidden');

}

});

});

carInput.addEventListener('input',()=>{

carInput.value = carInput.value
.toUpperCase()
.replace(/[^A-Z0-9]/g,'')
.slice(0,10);

});

function executeOrderAndPayment(){

if(cart.length===0){
alert('Please add items first');
return;
}

const orderMode = document.querySelector('input[name="orderType"]:checked').value;

let details='';

if(orderMode==='Table'){

if(!tableSelect.value){
alert('Please select table number');
return;
}

details=tableSelect.value;

}

if(orderMode==='Car'){

if(!carInput.value.trim()){
alert('Please enter car number');
return;
}

details=carInput.value.trim().toUpperCase();

}

if(orderMode==='Packing'){

const name = document.getElementById('customerName').value.trim();
const phone = document.getElementById('customerPhone').value.trim();

if(!name || !phone){
alert('Please enter name and mobile number');
return;
}

details=`${name} (${phone})`;

}

const paymentRef = 'HB' + Date.now().toString().slice(-6);

let whatsappText = 
`✨ *WELCOME TO HAKKA BAKKA CAFE* ✨

🙏 Thank you for your order.

━━━━━━━━━━━━━━━

📌 *ORDER DETAILS*

🧾 Payment Ref:
${paymentRef}

🍽️ Order Type:
${orderMode}

📍 Serving Details:
${details}

━━━━━━━━━━━━━━━

🛒 *ITEMS ORDERED*

`;

cart.forEach((item,index)=>{

whatsappText += 
`${index+1}. ${item.name}
   ${item.variant}
   ₹${item.price}

`;

});

whatsappText += 
`━━━━━━━━━━━━━━━

💰 *TOTAL BILL*
₹${total}

✅ Payment Mode:
UPI Payment

⏳ Please wait while your delicious order is being prepared.

❤️ Thank you for choosing
*Hakka Bakka Cafe*

📍 Jalandhar
`;

window.open(
`https://wa.me/917796631555?text=${encodeURIComponent(whatsappText)}`,
'_blank'
);

let shortCode='TO';

if(orderMode==='Car') shortCode='CO';
if(orderMode==='Packing') shortCode='TA';

const paymentNote=`HakkaBakka ${shortCode}`;

const upiId='7888854492@icici';
const merchant='Hakka Bakka Cafe';

const upiLink=`upi://pay?pa=${upiId}&pn=${encodeURIComponent(merchant)}&am=${total}&cu=INR&tn=${encodeURIComponent(paymentNote)}`;

const modal = document.createElement('div');

modal.style.position='fixed';
modal.style.inset='0';
modal.style.background='rgba(0,0,0,.92)';
modal.style.display='flex';
modal.style.justifyContent='center';
modal.style.alignItems='center';
modal.style.zIndex='99999';

modal.innerHTML=`
<div style="background:#161616;padding:30px;border-radius:20px;width:92%;max-width:420px;text-align:center;border:2px solid #D4AF37;">

<h2 style="color:#D4AF37;margin-bottom:20px;">Scan & Pay</h2>

<h1 style="font-size:3rem;margin-bottom:20px;">₹${total}</h1>

<div id="qrCode" style="background:white;padding:15px;border-radius:15px;display:inline-block;"></div>

<button id="openApps" style="width:100%;margin-top:20px;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,#D4AF37,#b89224);font-weight:800;cursor:pointer;">
Open Any UPI App
</button>

<button id="closeModal" style="margin-top:18px;background:none;border:none;color:#999;cursor:pointer;">
Cancel
</button>

</div>
`;

document.body.appendChild(modal);

new QRCode(document.getElementById('qrCode'),{
text:upiLink,
width:220,
height:220
});


document.getElementById('openApps').addEventListener('click',()=>{

if(/Android/i.test(navigator.userAgent)){
location.href = upiLink;
}else{
alert('Please scan QR using any UPI app');
}

});


document.getElementById('closeModal').addEventListener('click',()=>{
modal.remove();
});

}

if('serviceWorker' in navigator){
window.addEventListener('load',()=>{
navigator.serviceWorker.register('./sw.js');
});
}
