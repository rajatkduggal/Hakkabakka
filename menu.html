<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Order</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="dynamic-menu-target"></div>

<div class="cart-summary">
    <h3>Your Cart</h3>
    <div id="cart-items-box"></div>
    <p>Total ₹<span id="cart-total">0</span></p>

    <button class="confirm-btn" onclick="generateReceipt()">
        Confirm Order
    </button>
</div>

<script>
const menuDatabase = {
"Tandoori Veg":[
{name:"Paneer Tikka",price:240,img:"paneer.png"},
{name:"Paneer Malai Tikka",price:280,img:"paneer.png"},
{name:"Paneer Kali Mirch Tikka",price:280,img:"paneer.png"},
{name:"Mushroom Tikka",price:230,img:"paneer.png"}
],
"Veg Main Course":[
{name:"Dal Fry",price:80,img:"dal.png"},
{name:"Dal Makhni",price:90,img:"dal.png"},
{name:"Paneer Butter Masala",price:150,img:"paneer.png"},
{name:"Kadai Paneer",price:120,img:"paneer.png"}
],
"Non Veg":[
{name:"Butter Chicken",price:300,img:"chicken.png"},
{name:"Mutton Rogan Josh",price:350,img:"mutton.png"},
{name:"Chicken Curry",price:350,img:"chicken.png"}
],
"Breads":[
{name:"Tandoori Roti",price:10,img:"roti.png"},
{name:"Butter Naan",price:60,img:"naan.png"}
],
"Drinks":[
{name:"Sweet Lassi",price:70,img:"sweetlassi.png"},
{name:"Water Bottle",price:20,img:"water.png"},
{name:"All Shakes",price:100,img:"milkshake.png"}
]
};

let activeCart={};

function buildMenu(){
let html="";
for(let cat in menuDatabase){
html+=`<div class="section-title">${cat}</div><div class="menu-grid">`;

menuDatabase[cat].forEach(item=>{
html+=`
<div class="card">
<img src="${item.img}">
<div class="card-content">
<h3>${item.name}</h3>
<div class="price">₹${item.price}</div>
<button onclick="addToCart('${item.name}',${item.price})">Add to Order</button>
</div>
</div>
`;
});

html+="</div>";
}
document.getElementById("dynamic-menu-target").innerHTML=html;
}

function addToCart(name,price){
if(activeCart[name]){
activeCart[name].qty++;
}else{
activeCart[name]={price:price,qty:1};
}
refreshCart();
}

function refreshCart(){
let box=document.getElementById("cart-items-box");
let total=0;
box.innerHTML="";

for(let item in activeCart){
let qty=activeCart[item].qty;
let price=activeCart[item].price;
total+=qty*price;

box.innerHTML+=`
<div class="cart-item-row">
<span>${item} x${qty}</span>
<span>₹${qty*price}</span>
</div>
`;
}

document.getElementById("cart-total").innerText=total;
}

function generateReceipt(){
let total=document.getElementById("cart-total").innerText;

if(total=="0"){
alert("Add items first");
return;
}

let msg="Hakka Bakka Order%0A";
for(let item in activeCart){
msg+=`${item} x${activeCart[item].qty}%0A`;
}
msg+=`Total: ₹${total}`;

window.location.href=`https://wa.me/917796631555?text=${msg}`;
}

buildMenu();
</script>

</body>
</html>
